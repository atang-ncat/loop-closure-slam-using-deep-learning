# ============================================================
# Loop Closure Detection — Master Configuration
# ============================================================

# --- Paths ---
paths:
  dataset_root: "dataset"
  processed_root: "processed"
  lidar_subdir: "lidar/pointclouds"
  camera_subdir: "camera/images"
  odometry_csv: "odometry/novatel_odom.csv"
  gps_csv: "gps/inspva_precision.csv"

# --- Step 1A: Sync & Projection ---
sync:
  max_sync_error_ms: 50.0       # discard pairs with sync error above this

projection:
  num_beams: 128                 # Ouster OS1-128
  num_columns: 1024              # azimuth resolution
  max_range: 100.0               # clip ranges above this (meters)
  fields_per_point: 5            # x, y, z, intensity, ring

# --- Step 1C: Triplet Mining ---
mining:
  d_pos_m: 5.0                  # max distance (m) for "same place"
  d_neg_m: 10.0                 # min distance (m) for "different place"
  d_time_s: 60.0                # min temporal gap (s) for positive pairs

# --- Step 2B: Model ---
model:
  embedding_dim: 512
  backbone: resnet50             # resnet18 or resnet50
  gem_p: 3.0                     # GeM pooling initial power
  camera_input_size: [224, 224]  # resize camera images to this

# --- Step 3: Training ---
training:
  loss: multi_similarity         # triplet or multi_similarity
  batch_size: 12                 # reduced for ResNet-50 memory
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4           # stronger regularization for larger model
  num_epochs: 50
  triplet_margin: 1.0            # used for validation metric
  early_stopping_patience: 15    # more patience with cosine annealing
  modality_dropout_prob: 0.15
  accumulate_grad_batches: 4     # effective batch = 48
  amp: true
  # Multi-Similarity Loss params
  ms_alpha: 2.0
  ms_beta: 50.0
  ms_base: 0.5

# --- Train / Val / Test split (by time) ---
split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
